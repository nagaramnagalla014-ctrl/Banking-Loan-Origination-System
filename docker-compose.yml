version: '3.7'

services:
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: loan-oracle
    restart: unless-stopped
    environment:
      ORACLE_PASSWORD: rootpass
      APP_USER: loan_user
      APP_USER_PASSWORD: loan123
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 20s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.8-management-alpine
    container_name: loan-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 30s
      timeout: 10s
      retries: 5

  app:
    build: .
    container_name: loan-app
    restart: unless-stopped
    depends_on:
      - oracle
      - rabbitmq
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@oracle:1521/XEPDB1
      SPRING_DATASOURCE_USERNAME: loan_user
      SPRING_DATASOURCE_PASSWORD: loan123
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      APP_JWT_SECRET: BankingLoanOriginationSystem2018SecretKeyForJWTTokenGeneration
      APP_JWT_EXPIRATION: 86400000
    ports:
      - "8080:8080"

volumes:
  oracle_data:
