spring.application.name=loan-origination-system

# Oracle DataSource
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:XE
spring.datasource.username=loan_user
spring.datasource.password=loan123
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.Oracle12cDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.open-in-view=false

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3

# JWT
app.jwt.secret=BankingLoanOriginationSystem2018SecretKeyForJWTTokenGeneration
app.jwt.expiration=86400000

# Server
server.port=8080
server.servlet.context-path=/

# Loan business rules
app.loan.auto-approve-credit-score=750
app.loan.auto-reject-credit-score=580
app.loan.manager-approval-threshold=2500000

# Multipart upload (documents)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
